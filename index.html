<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KSP Quote &amp; Invoice App</title>
<meta name="theme-color" content="#292D30">
<meta name="description" content="Kym Schafer Plastering — quotes &amp; invoices">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KSP App">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
:root{
  --cream:#FBF7F2; --cream2:#F4EFE8; --char:#292D30; --char2:#3A3F43;
  --red:#9B504C; --red2:#8A4641; --gold:#C0A088; --gold2:#A8845F;
  --ink:#2B2B2B; --muted:#6B6B6B; --line:#E2D9CD; --ok:#2E7D52; --warn:#B5762B; --danger:#B23B3B;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.45}
header.top{background:var(--char);color:var(--cream);position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.bar{display:flex;align-items:center;gap:12px;padding:8px 14px;max-width:1080px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.5px}
.brand img{width:38px;height:38px;border-radius:6px;background:var(--cream)}
.brand small{display:block;font-weight:500;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
nav button{background:transparent;border:0;color:var(--cream);padding:8px 12px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600}
nav button:hover{background:var(--char2)}
nav button.active{background:var(--red);color:#fff}
main{max-width:1080px;margin:0 auto;padding:18px 14px 60px}
h1{font-size:24px;margin:4px 0 2px;color:var(--char)}
h2{font-size:18px;color:var(--char);margin:22px 0 10px;border-bottom:2px solid var(--line);padding-bottom:6px}
h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin:0 0 8px}
.sub{color:var(--muted);margin:0 0 14px}
.grid{display:grid;gap:14px}
.cards{grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
.card .big{font-size:26px;font-weight:800;color:var(--char)}
.card .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:2px}
.card.accent{border-top:4px solid var(--red)}
.card.gold{border-top:4px solid var(--gold)}
.panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--char);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(192,160,136,.25)}
textarea{min-height:64px;resize:vertical}
.row{display:grid;gap:12px}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3{grid-template-columns:1fr 1fr 1fr}
.row.c4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:640px){.row.c2,.row.c3,.row.c4{grid-template-columns:1fr}}
button.btn{background:var(--red);color:#fff;border:0;padding:11px 18px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer}
button.btn:hover{background:var(--red2)}
button.btn.dark{background:var(--char)}button.btn.dark:hover{background:var(--char2)}
button.btn.gold{background:var(--gold2)}button.btn.gold:hover{background:var(--gold)}
button.btn.ghost{background:transparent;color:var(--char);border:1.5px solid var(--line)}
button.btn.ghost:hover{background:var(--cream2)}
button.mini{background:transparent;border:1px solid var(--line);color:var(--char);padding:5px 9px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
button.mini:hover{background:var(--cream2)}
button.mini.del{color:var(--danger);border-color:#e7c4c4}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
table.items{width:100%;border-collapse:collapse;margin-top:6px}
table.items th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:6px 6px;border-bottom:2px solid var(--line)}
table.items td{padding:5px 4px;vertical-align:top;border-bottom:1px solid var(--cream2)}
table.items input,table.items textarea{padding:7px 8px;font-size:14px}
.tot{display:flex;justify-content:flex-end;margin-top:10px}
.tot table{min-width:260px}
.tot td{padding:5px 8px}
.tot td.r{text-align:right;font-variant-numeric:tabular-nums}
.tot tr.grand td{font-size:18px;font-weight:800;color:#fff;background:var(--red)}
.list{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.list th{background:var(--cream2);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px}
.list td{padding:10px;border-top:1px solid var(--cream2);font-size:14px}
.list tr:hover td{background:var(--cream)}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.tag.draft{background:#eee;color:#555}.tag.sent{background:#e7eef6;color:#2f5d8a}
.tag.accepted,.tag.paid{background:#e3f1e8;color:var(--ok)}
.tag.declined,.tag.overdue{background:#f6e3e3;color:var(--danger)}
.muted{color:var(--muted)}.right{text-align:right}.center{text-align:center}
.mono{font-variant-numeric:tabular-nums}
.scanbox{border:2px dashed var(--gold);border-radius:14px;padding:26px;text-align:center;background:#fff}
.scanbox img.prev{max-width:100%;max-height:320px;border-radius:10px;margin-top:14px;border:1px solid var(--line)}
.pill{display:inline-flex;gap:8px;align-items:center;background:var(--cream2);border:1px solid var(--line);border-radius:30px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.pill input{display:none}
.pill.sel{background:var(--red);color:#fff;border-color:var(--red)}
.empty{text-align:center;color:var(--muted);padding:40px 10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--char);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:200;font-weight:600;opacity:0;transition:opacity .2s,bottom .2s;pointer-events:none}
.toast.show{opacity:1;bottom:30px}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{justify-content:space-between}
.note{font-size:13px;color:var(--muted);background:var(--cream2);border-left:3px solid var(--gold);padding:9px 12px;border-radius:6px;margin:10px 0}
.warn-banner{background:#fbf1e3;border:1px solid #e6cfa6;color:#7a5a25;padding:11px 14px;border-radius:10px;font-size:14px;margin:0 0 16px}
.searchbar{margin-bottom:12px}
.searchbar input{max-width:340px}
@media(max-width:640px){.row.c2 h2{margin-top:14px}}
</style>
</head>
<body>
<header class="top">
  <div class="bar">
    <div class="brand"><img id="brandLogo" alt="KSP"><span>KSP<small>Kym Schafer Plastering</small></span></div>
    <nav id="nav"></nav>
  </div>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>

/* ---------- storage ---------- */
const K={set:'ksp_settings',cust:'ksp_customers',q:'ksp_quotes',inv:'ksp_invoices',scan:'ksp_scans',exp:'ksp_expenses'};
function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v??def;}catch(e){return def;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
const DEFAULTS={businessName:'Kym Schafer Plastering',phone:'0435 853 897',email:'kspplastering@gmail.com',serviceArea:'Servicing Sunshine Coast & Surrounds',facebook:'KSP Plastering',
  bankName:'Commonwealth Bank',accName:'Kim Schafer Plastering',bsb:'064 123',accNumber:'1054 9877',
  gstRate:10,gstEnabled:true,quotePrefix:'QT',invoicePrefix:'INV',quoteSeq:0,invoiceSeq:0};
function effGst(){const s=settings();return s.gstEnabled?(Number(s.gstRate)||0):0;}
function settings(){return Object.assign({},DEFAULTS,load(K.set,{}));}
function saveSettings(s){save(K.set,s);}
function quotes(){return load(K.q,[]);}function invoices(){return load(K.inv,[]);}
function customers(){return load(K.cust,[]);}function scans(){return load(K.scan,[]);}function expenses(){return load(K.exp,[]);}

/* ---------- helpers ---------- */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function pad3(n){return String(n).padStart(3,'0');}
function curYear(){return new Date().getFullYear();}
function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function addDaysISO(iso,days){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function money(n){n=Number(n)||0;return '$'+n.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
function num(n){n=Number(n)||0;return n.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function nextNumber(type){const s=settings();const seqKey=type==='invoice'?'invoiceSeq':'quoteSeq';const pre=type==='invoice'?s.invoicePrefix:s.quotePrefix;const n=(s[seqKey]||0)+1;s[seqKey]=n;saveSettings(s);return pre+'-'+curYear()+'-'+pad3(n);}
function calcTotals(items,gstRate){let sub=0;items.forEach(it=>{sub+=(Number(it.qty)||0)*(Number(it.rate)||0);});const gst=sub*(Number(gstRate)||0)/100;return{sub:round2(sub),gst:round2(gst),total:round2(sub+gst)};}
function round2(n){return Math.round((Number(n)||0)*100)/100;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function records(type){return type==='invoice'?invoices():(type==='expense'?expenses():quotes());}
function saveRecords(type,arr){save(type==='invoice'?K.inv:(type==='expense'?K.exp:K.q),arr);}

/* ---------- router ---------- */
const ROUTES=[['dashboard','Dashboard'],['scan','New Scan'],['quote','New Quote'],['invoice','New Invoice'],['quotes','Quotes'],['invoices','Invoices'],['expenses','Expenses'],['customers','Customers'],['export','Export'],['settings','Settings']];
let state={page:'dashboard',editId:null,editType:null,items:[],scanRef:null};
function go(page,opts={}){state.page=page;Object.assign(state,opts);renderNav();window.scrollTo(0,0);render();}
function renderNav(){document.getElementById('nav').innerHTML=ROUTES.map(([id,label])=>`<button class="${state.page===id?'active':''}" onclick="go('${id}')">${label}</button>`).join('');}

/* ---------- pages ---------- */
function render(){
  const app=document.getElementById('app');
  if(state.page==='dashboard')app.innerHTML=viewDashboard();
  else if(state.page==='scan')renderScan(app);
  else if(state.page==='quote'||state.page==='invoice')renderDocForm(app,state.page);
  else if(state.page==='expense')renderExpenseForm(app);
  else if(state.page==='quotes')app.innerHTML=viewList('quote');
  else if(state.page==='invoices')app.innerHTML=viewList('invoice');
  else if(state.page==='expenses')app.innerHTML=viewExpenses();
  else if(state.page==='customers')renderCustomers(app);
  else if(state.page==='export')app.innerHTML=viewExport();
  else if(state.page==='settings')renderSettings(app);
  if(state.page==='dashboard')maybeShowInstall();
}

/* ----- Dashboard ----- */
function recentTable(type){
  const isInv=type==='invoice';const list=records(type).slice().sort((a,b)=>(b.created||'').localeCompare(a.created||'')).slice(0,5);
  if(!list.length)return `<div class="empty">No ${isInv?'invoices':'quotes'} yet.</div>`;
  return `<table class="list"><tr><th>Number</th><th>Customer</th><th>Date</th><th class="right">Total</th><th>Status</th><th></th></tr>
  ${list.map(r=>`<tr><td class="mono"><b>${esc(r.number)}</b></td><td>${esc(r.customer?.name||'')}</td><td>${fmtDate(r.date)}</td><td class="right mono">${money(r.total)}</td><td><span class="tag ${(r.status||'draft').toLowerCase()}">${esc(r.status||'Draft')}</span></td>
  <td class="right"><button class="mini" onclick="editDoc('${type}','${r.id}')">Open</button></td></tr>`).join('')}</table>`;
}
function viewDashboard(){
  const yr=curYear();const s=settings();const qs=quotes().filter(q=>(q.date||'').startsWith(yr));const ivs=invoices().filter(i=>(i.date||'').startsWith(yr));
  const exps=expenses().filter(e=>(e.date||'').startsWith(yr));
  const invVal=ivs.reduce((a,b)=>a+(b.total||0),0);
  const paid=ivs.filter(i=>i.status==='Paid');const unpaid=ivs.filter(i=>i.status!=='Paid');
  const paidVal=paid.reduce((a,b)=>a+(b.total||0),0);const outVal=unpaid.reduce((a,b)=>a+(b.total||0),0);
  const expVal=exps.reduce((a,b)=>a+(b.amount||0),0);
  const expGst=exps.reduce((a,b)=>a+((b.taxDeductible!==false)?(b.gst||0):0),0);
  const installed=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches;
  return `<h1>Dashboard</h1><p class="sub">${esc(s.businessName)} — overview for ${yr}</p>
  <div class="warn-banner">⚠️ <b>Records are saved on this device only.</b> Tap <b>Export</b> regularly to back them up for tax time.</div>
  <div class="grid cards">
    <div class="card accent"><div class="big">${qs.length}</div><div class="lbl">Quotes this year</div></div>
    <div class="card accent"><div class="big">${ivs.length}</div><div class="lbl">Invoices this year</div></div>
    <div class="card gold"><div class="big">${money(invVal)}</div><div class="lbl">Invoice value</div></div>
    <div class="card"><div class="big" style="color:var(--danger)">${money(outVal)}</div><div class="lbl">Outstanding (${unpaid.length})</div></div>
    <div class="card"><div class="big" style="color:var(--ok)">${money(paidVal)}</div><div class="lbl">Paid (${paid.length})</div></div>
    <div class="card"><div class="big">${money(expVal)}</div><div class="lbl">Expenses this year</div></div>
  </div>
  <div class="actions">
    <button class="btn" onclick="go('scan')">📷 New Scan</button>
    <button class="btn dark" onclick="newDoc('quote')">＋ New Quote</button>
    <button class="btn dark" onclick="newDoc('invoice')">＋ New Invoice</button>
    <button class="btn dark" onclick="newExpense()">＋ New Expense</button>
    <button class="btn gold" onclick="go('export')">⤓ Export for Tax Time</button>
  </div>
  ${installed?'':`<div class="panel" id="installPanel"><h3>📲 Install on your phone</h3>
    <div id="installBtnWrap"></div>
    <div class="muted" style="font-size:14px;line-height:1.6">Open this page in <b>Chrome</b> (Android) or <b>Safari</b> (iPhone), then:<br>
    • iPhone: tap the <b>Share</b> button, then <b>Add to Home Screen</b>.<br>
    • Android: tap the <b>⋮ menu</b>, then <b>Add to Home screen / Install app</b>.<br>
    The KSP icon will appear on your home screen and open like a normal app.</div></div>`}
  <div class="row c2" style="margin-top:6px">
    <div><h2>Recent quotes</h2>${recentTable('quote')}</div>
    <div><h2>Recent invoices</h2>${recentTable('invoice')}</div>
  </div>`;
}

/* ----- New Scan ----- */
function renderScan(app){
  app.innerHTML=`<h1>New Scan</h1><p class="sub">Photograph or upload a handwritten quote or invoice, then review &amp; correct the details.</p>
  <div class="panel">
    <label>Document type</label>
    <div class="flex" id="scanType">
      <label class="pill sel"><input type="radio" name="st" value="quote" checked>Quote</label>
      <label class="pill"><input type="radio" name="st" value="invoice">Invoice</label>
    </div>
    <div class="scanbox" style="margin-top:16px">
      <div><b>Take a photo</b> (phone) or <b>upload an image</b> from this computer</div>
      <div class="flex" style="justify-content:center;margin-top:14px">
        <label class="btn">📷 Take / Choose photo<input type="file" id="scanFile" accept="image/*" capture="environment" style="display:none"></label>
      </div>
      <div id="prevWrap"></div>
    </div>
    <div class="note">OCR (automatic reading) can be added later — for now the photo is saved and you fill in the details on the next screen. Nothing is lost: the original image is kept with the document.</div>
    <div class="actions"><button class="btn dark" id="digBtn" disabled onclick="digitise()">Digitise Document →</button></div>
  </div>`;
  document.querySelectorAll('#scanType .pill').forEach(p=>p.onclick=()=>{document.querySelectorAll('#scanType .pill').forEach(x=>x.classList.remove('sel'));p.classList.add('sel');p.querySelector('input').checked=true;});
  document.getElementById('scanFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state._scanData=r.result;document.getElementById('prevWrap').innerHTML=`<img class="prev" src="${r.result}">`;document.getElementById('digBtn').disabled=false;};r.readAsDataURL(f);};
}
function digitise(){
  const type=document.querySelector('#scanType input:checked').value;
  const yr=curYear();const list=scans();const n=pad3(list.length+1);
  const ref={id:uid(),name:`scan-${yr}-${n}`,data:state._scanData,date:todayISO(),type};
  list.push(ref);save(K.scan,list);state._scanData=null;
  toast('Photo saved — now review the details');
  newDoc(type,ref);
}

/* ----- Doc form (quote/invoice) ----- */
function newDoc(type,scanRef){state.editId=null;state.editType=type;state.scanRef=scanRef||null;
  state.items=[blankItem()];go(type,{editId:null,editType:type});}
function editDoc(type,id){const rec=records(type).find(r=>r.id===id);if(!rec)return;state.editId=id;state.editType=type;state.scanRef=rec.scanRef||null;state.items=JSON.parse(JSON.stringify(rec.items||[blankItem()]));state._editRec=rec;go(type,{editId:id,editType:type});}
function blankItem(){return{description:'',details:'',qty:1,unit:'ea',rate:0};}

    <td><input value="${esc(it.description)}" oninput="upItem(${i},'description',this.value)" placeholder="Description">

    <td><input type="number" step="0.01" value="${esc(it.qty)}" oninput="upItem(${i},'qty',this.value)"></td>
    <td><input value="${esc(it.unit)}" oninput="upItem(${i},'unit',this.value)"></td>
    <td><input type="number" step="0.01" value="${esc(it.rate)}" oninput="upItem(${i},'rate',this.value)"></td>
    <td class="mono right" style="padding-top:14px">${money((Number(it.qty)||0)*(Number(it.rate)||0))}</td>
    <td><button class="mini del" onclick="delItem(${i})" ${state.items.length<=1?'disabled':''}>✕</button></td>
  </tr>`).join('');
  recalc();
}
function upItem(i,k,v){state.items[i][k]=v;if(k==='qty'||k==='rate'){renderItems();}else{recalc();}}
function addItem(){state.items.push(blankItem());renderItems();}
function delItem(i){if(state.items.length<=1)return;state.items.splice(i,1);renderItems();}
function recalc(){const t=calcTotals(state.items,effGst());document.getElementById('t_sub').textContent=money(t.sub);document.getElementById('t_gst').textContent=money(t.gst);document.getElementById('t_total').textContent=money(t.total);return t;}

function gatherDoc(type){
  const isInv=type==='invoice';const g=id=>document.getElementById(id)?.value||'';
  const customer={name:g('f_name'),phone:g('f_phone'),email:g('f_email'),address:g('f_address'),suburb:g('f_suburb'),state:g('f_state'),postcode:g('f_postcode')};
  const items=state.items.map(it=>({description:it.description,details:it.details,qty:round2(it.qty),unit:it.unit,rate:round2(it.rate),amount:round2((Number(it.qty)||0)*(Number(it.rate)||0))}));
  const t=calcTotals(items,effGst());
  const rec={customer,number:g('f_number').trim(),projectName:g('f_proj'),projectAddress:g('f_projaddr'),date:g('f_date'),notes:g('f_notes'),status:g('f_status'),items,subtotal:t.sub,gst:t.gst,total:t.total,scanRef:state.scanRef};
  if(isInv){rec.dueDate=g('f_term');rec.paidDate=g('f_paid');}else{rec.validUntil=g('f_term');}
  return rec;
}
function maybeSaveCustomer(c){if(!c.name)return;const list=customers();const ex=list.find(x=>x.name.toLowerCase()===c.name.toLowerCase());if(ex){Object.assign(ex,c);}else{list.push({id:uid(),...c});}save(K.cust,list);}
function bumpSeq(type,number){const s=settings();const m=String(number).match(/(\d+)\s*$/);if(!m)return;const n=parseInt(m[1],10);const key=type==='invoice'?'invoiceSeq':'quoteSeq';if(n>(s[key]||0)){s[key]=n;saveSettings(s);}}
function saveDoc(thenPdf,action){
  const type=state.editType;const isInv=type==='invoice';
  const data=gatherDoc(type);
  if(!data.customer.name){toast('Please enter a customer name');return;}
  const s=settings();const pre=isInv?s.invoicePrefix:s.quotePrefix;const seq=isInv?s.invoiceSeq:s.quoteSeq;
  const auto=pre+'-'+curYear()+'-'+pad3((seq||0)+1);
  let number=(data.number||'').trim()||auto;
  if(records(type).some(r=>r.number===number && r.id!==state.editId)){if(!confirm('Number '+number+' already exists. Save anyway?'))return;}
  const list=records(type);let rec;
  if(state.editId){rec=list.find(r=>r.id===state.editId);Object.assign(rec,data);rec.number=number;}
  else{if(number===auto){number=nextNumber(type);}else{bumpSeq(type,number);}rec={id:uid(),created:new Date().toISOString(),...data};rec.number=number;list.push(rec);state.editId=rec.id;state._editRec=rec;}
  if(action==='paid'){rec.status='Paid';if(!rec.paidDate)rec.paidDate=todayISO();}
  saveRecords(type,list);maybeSaveCustomer(data.customer);
  toast(`${isInv?'Invoice':'Quote'} ${rec.number} saved`);
  if(thenPdf){generatePDF(type,rec);}
  if(action==='dup'){duplicateToInvoice(rec.id);return;}
  go(isInv?'invoices':'quotes');
}
function duplicateToInvoice(quoteId){
  const q=quotes().find(x=>x.id===quoteId);if(!q){toast('Quote not found');return;}
  const inv=invoices();const number=nextNumber('invoice');
  const rec={id:uid(),number,created:new Date().toISOString(),customer:JSON.parse(JSON.stringify(q.customer||{})),
    projectName:q.projectName,projectAddress:q.projectAddress,date:todayISO(),dueDate:addDaysISO(todayISO(),14),
    notes:q.notes,status:'Draft',paidDate:'',items:JSON.parse(JSON.stringify(q.items||[])),subtotal:q.subtotal,gst:q.gst,total:q.total,scanRef:q.scanRef||null};
  inv.push(rec);saveRecords('invoice',inv);toast('Invoice '+number+' created from quote');editDoc('invoice',rec.id);
}
function markPaid(id){const list=invoices();const r=list.find(x=>x.id===id);if(r){r.status='Paid';if(!r.paidDate)r.paidDate=todayISO();saveRecords('invoice',list);render();toast('Marked paid');}}

/* ---------- PDF ---------- */
const CHAR=[41,45,48],CHAR2=[58,63,67],RED=[155,80,76],GOLD=[192,160,136],CREAM=[251,247,242],GREY=[110,110,110],INK=[43,43,43];
function buildPDF(type,rec){
  const isInv=type==='invoice';const s=settings();const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});const PW=210,PH=297,M=12;
  const slogansInv=['Quality finishes. Built to last.','Professional plastering solutions','Reliable service on time, every time','Attention to detail we take pride','Smooth finishes. Strong results.'];
  const slogan='Smooth finishes. Strong results.';
  function bg(){doc.setFillColor(...CREAM);doc.rect(0,0,PW,PH,'F');}
  function header(){
    doc.addImage(LOGO,'PNG',M,8,26,26);
    doc.setTextColor(...CHAR);doc.setFont('helvetica','bold');doc.setFontSize(15);
    doc.text(s.businessName||'Kym Schafer Plastering',PW-M,14,{align:'right'});
    doc.setFont('helvetica','normal');doc.setFontSize(8.4);doc.setTextColor(...GREY);
    let yy=19.5;[s.phone+'  ·  '+s.email,s.serviceArea,'Facebook: '+s.facebook].forEach(l=>{doc.text(l,PW-M,yy,{align:'right'});yy+=4.3;});
    doc.setDrawColor(...GOLD);doc.setLineWidth(0.6);doc.line(M,37,PW-M,37);
    doc.setDrawColor(...RED);doc.setLineWidth(1.4);doc.line(M,37,M+46,37);
  }
  function footer(){
    const top=PH-23;
    doc.setFillColor(...CHAR);doc.rect(0,top,PW,23,'F');
    doc.setFillColor(...GOLD);doc.rect(0,top,PW,1.4,'F');
    doc.setTextColor(...GOLD);doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text((s.businessName||'Kym Schafer Plastering').toUpperCase(),PW/2,top+8.5,{align:'center'});
    doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(206,196,186);
    doc.text(slogan,PW/2,top+14,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(170,162,152);
    if(isInv){doc.text(slogansInv.slice(0,4).join('   ·   '),PW/2,top+19,{align:'center'});}
    else{doc.text(s.phone+'   ·   '+s.email+'   ·   '+s.serviceArea,PW/2,top+19,{align:'center'});}
  }
  const c=rec.customer||{};
  const addrLines=[c.address,[c.suburb,c.state,c.postcode].filter(Boolean).join(' ')].filter(Boolean);
  function firstBlocks(){
    doc.setTextColor(...CHAR);doc.setFont('helvetica','bold');doc.setFontSize(30);
    doc.text(isInv?'INVOICE':'QUOTE',M,52);
    doc.setDrawColor(...RED);doc.setLineWidth(1.6);doc.line(M,55,M+(isInv?42:34),55);
    let mx=PW-M-58, mw=58, my=44;
    const meta=(label,val)=>{doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GREY);doc.text(label.toUpperCase(),mx,my);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...CHAR);doc.text(String(val||'—'),mx+mw,my,{align:'right'});my+=7;};
    meta(isInv?'Invoice No':'Quote No',rec.number);
    meta(isInv?'Invoice Date':'Quote Date',fmtDate(rec.date));
    meta(isInv?'Due Date':'Valid Until',fmtDate(isInv?rec.dueDate:rec.validUntil));
    let by=66;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...RED);doc.text(isInv?'BILL TO':'QUOTE TO',M,by);by+=6;
    doc.setTextColor(...INK);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text(c.name||'',M,by);by+=5.2;
    doc.setFont('helvetica','normal');doc.setFontSize(9.2);doc.setTextColor(70,70,70);
    addrLines.forEach(l=>{doc.text(l,M,by);by+=4.6;});
    if(c.phone){doc.text('Ph: '+c.phone,M,by);by+=4.6;}
    if(c.email){doc.text(c.email,M,by);by+=4.6;}
    if(rec.projectName||rec.projectAddress){let py=66;const px=PW-M-78;
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...RED);doc.text('PROJECT',px,py);py+=6;
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...INK);
      if(rec.projectName){const ln=doc.splitTextToSize(rec.projectName,78);doc.text(ln,px,py);py+=5*ln.length;}
      doc.setFont('helvetica','normal');doc.setFontSize(9.2);doc.setTextColor(70,70,70);
      if(rec.projectAddress){doc.text(doc.splitTextToSize(rec.projectAddress,78),px,py);}
    }
  }
  function chrome(first){bg();header();footer();if(first)firstBlocks();}
  // paint page 1 BEFORE the table so table draws on top of the cream background
  chrome(true);
  let billBottom=66+6+5.2+addrLines.length*4.6+(c.phone?4.6:0)+(c.email?4.6:0);
  let projBottom=66;
  if(rec.projectName||rec.projectAddress){projBottom=72+(rec.projectName?doc.splitTextToSize(rec.projectName,78).length*5:0)+(rec.projectAddress?doc.splitTextToSize(rec.projectAddress,78).length*4.6:0);}
  const tableTop=Math.max(billBottom,projBottom,92)+4;
  const body=(rec.items||[]).map(it=>{const desc=it.description||'';const det=it.details?'\n'+it.details:'';return [desc+det,num(it.qty),it.unit||'',money(it.rate),money(it.amount)];});
  doc.autoTable({
    startY:tableTop,margin:{left:M,right:M,top:42,bottom:27},
    head:[['DESCRIPTION','QTY','UNIT','RATE','AMOUNT']],body,theme:'grid',
    styles:{font:'helvetica',fontSize:9,cellPadding:2.6,lineColor:[226,217,205],lineWidth:0.1,textColor:INK},
    headStyles:{fillColor:CHAR,textColor:CREAM,fontStyle:'bold',fontSize:9,halign:'left',lineWidth:0},
    alternateRowStyles:{fillColor:[246,243,238]},
    columnStyles:{0:{cellWidth:92},1:{cellWidth:16,halign:'right'},2:{cellWidth:18,halign:'center'},3:{cellWidth:26,halign:'right'},4:{cellWidth:34,halign:'right'}},
    willDrawPage:(d)=>{if(d.pageNumber>1)chrome(false);}
  });
  let y=doc.lastAutoTable.finalY+8;
  const need=isInv?64:70;
  if(y+need>PH-27){doc.addPage();chrome(false);y=46;}
  const tlx=PW-M-66, trx=PW-M;
  function trow(l,v,grand){if(grand){doc.setFillColor(...RED);doc.rect(tlx-4,y-5.2,(trx)-(tlx-4),8.4,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11.5);}
    else{doc.setTextColor(70,70,70);doc.setFont('helvetica','normal');doc.setFontSize(10);}
    doc.text(l,tlx,y);doc.text(v,trx,y,{align:'right'});y+=grand?9:6.4;}
  let ty0=y;
  trow('Subtotal',money(rec.subtotal));
  trow(s.gstEnabled?('GST '+s.gstRate+'%'):'GST',money(rec.gst));
  y+=1.5;trow('TOTAL '+(isInv?'DUE':'INC. GST'),money(rec.total),true);
  const afterTotals=y;
  let ny=ty0;
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...RED);doc.text('NOTES',M,ny);ny+=5.5;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
  const notes=rec.notes||(isInv?'Thank you for your business.':'Thank you for the opportunity to quote.');
  doc.text(doc.splitTextToSize(notes,95),M,ny);
  y=Math.max(afterTotals,ny+12)+6;
  if(isInv){
    const bh=34;if(y+bh>PH-27){doc.addPage();chrome(false);y=46;}
    doc.setFillColor(255,255,255);doc.setDrawColor(...GOLD);doc.setLineWidth(0.4);doc.roundedRect(M,y,PW-2*M,bh,2,2,'FD');
    doc.setFillColor(...CHAR);doc.rect(M,y,PW-2*M,8,'F');
    doc.setTextColor(...CREAM);doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.text('PAYMENT DETAILS',M+4,y+5.4);
    doc.setTextColor(...GREY);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text('Payment due within 7 days',PW-M-4,y+5.4,{align:'right'});
    doc.setTextColor(...INK);doc.setFontSize(9.4);let py2=y+14;
    const pairs=[['Bank',s.bankName],['Account Name',s.accName],['BSB',s.bsb],['Account Number',s.accNumber],['Reference',rec.number]];
    pairs.forEach((p,i)=>{const cx=M+6+(i%2)*((PW-2*M)/2);const cy=py2+Math.floor(i/2)*6;doc.setFont('helvetica','bold');doc.text(p[0]+':',cx,cy);doc.setFont('helvetica','normal');doc.text(String(p[1]||''),cx+30,cy);});
  } else {
    const bh=40;if(y+bh>PH-27){doc.addPage();chrome(false);y=46;}
    doc.setFillColor(255,255,255);doc.setDrawColor(...GOLD);doc.setLineWidth(0.4);doc.roundedRect(M,y,PW-2*M,bh,2,2,'FD');
    doc.setFillColor(...CHAR);doc.rect(M,y,PW-2*M,8,'F');
    doc.setTextColor(...CREAM);doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.text('ACCEPTANCE',M+4,y+5.4);
    doc.setTextColor(...INK);doc.setFont('helvetica','italic');doc.setFontSize(9.6);
    doc.text('"I accept this quote and authorise the works to proceed."',M+6,y+15);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setDrawColor(120,120,120);doc.setLineWidth(0.3);
    const ly=y+30, w=(PW-2*M-18)/3;
    doc.line(M+6,ly,M+6+w-6,ly);doc.text('Signature',M+6,ly+4);
    doc.line(M+6+w,ly,M+6+2*w-6,ly);doc.text('Name',M+6+w,ly+4);
    doc.line(M+6+2*w,ly,M+6+3*w-6,ly);doc.text('Date',M+6+2*w,ly+4);
  }
  return doc;
}
function pdfFileName(type,rec){const cust=(rec.customer?.name||'Customer').replace(/[\\/:*?"<>|]/g,'').trim();return `${rec.number} - ${cust}.pdf`;}
function generatePDF(type,rec,id){
  if(!rec){rec=records(type).find(r=>r.id===id);}if(!rec){toast('Not found');return;}
  const doc=buildPDF(type,rec);doc.save(pdfFileName(type,rec));toast('PDF generated');
}

  </div>`;
}

/* ---------- Tax-time export ---------- */
async function exportTaxZip(){
  toast('Building tax export…');
  const zip=new JSZip();const yr=curYear();const root=zip.folder('KSP');
  function csvEsc(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
  const invF=root.folder('invoices').folder(String(yr));
  const ivs=invoices();let invCsv=['Invoice Number,Customer Name,Date,Due Date,Subtotal,GST,Total,Status,Paid Date'];
  ivs.forEach(r=>{const d=buildPDF('invoice',r);invF.file(pdfFileName('invoice',r),d.output('blob'));
    invCsv.push([r.number,r.customer?.name,fmtDate(r.date),fmtDate(r.dueDate),r.subtotal,r.gst,r.total,r.status,fmtDate(r.paidDate)].map(csvEsc).join(','));});
  const qF=root.folder('quotes').folder(String(yr));
  const qs=quotes();let qCsv=['Quote Number,Customer Name,Date,Valid Until,Subtotal,GST,Total,Status'];
  qs.forEach(r=>{const d=buildPDF('quote',r);qF.file(pdfFileName('quote',r),d.output('blob'));
    qCsv.push([r.number,r.customer?.name,fmtDate(r.date),fmtDate(r.validUntil),r.subtotal,r.gst,r.total,r.status].map(csvEsc).join(','));});

  const exps=expenses();let expCsv=['Date,Supplier,Description,Category,Payment,Amount,GST,Tax Deductible,Status,Notes'];
  const receiptF=root.folder('receipts').folder(String(yr));
  exps.forEach(e=>{
    expCsv.push([fmtDate(e.date),e.supplier,e.description,e.category,e.payment,e.amount,e.gst,e.taxDeductible?'Yes':'No',e.status,e.notes].map(csvEsc).join(','));
    if(e.receiptData){const clean=e.receiptData.replace(/^data:image\/\w+;base64,/,"");receiptF.file(`${fmtDate(e.date).replace(/\//g,'-')}_${(e.supplier||'').replace(/[\\/:*?"<>|]/g,'')}_${e.id}.jpg`,clean,{base64:true});}
    e.status='Exported';
  });
  save(K.exp,exps);

  let cCsv=['Name,Phone,Email,Address,Suburb,State,Postcode,Notes'];
  customers().forEach(c=>cCsv.push([c.name,c.phone,c.email,c.address,c.suburb,c.state,c.postcode,c.notes].map(csvEsc).join(',')));
  const data=root.folder('data');
  data.file('customers.json',JSON.stringify(customers(),null,2));
  data.file('invoices.json',JSON.stringify(ivs,null,2));
  data.file('quotes.json',JSON.stringify(qs,null,2));
  data.file('expenses.json',JSON.stringify(exps,null,2));
  root.folder('scans').folder('original-images').folder(String(yr)).file('README.txt','Original scanned photos are stored inside the app browser storage. They are included with each document on screen.');
  root.file('invoices-summary.csv',invCsv.join('\n'));
  root.file('quotes-summary.csv',qCsv.join('\n'));
  root.file('expenses-summary.csv',expCsv.join('\n'));
  root.file('customers.csv',cCsv.join('\n'));
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`KSP-tax-export-${yr}.zip`;a.click();
  toast('Tax export downloaded');
  if(state.page==='export')render();
}
